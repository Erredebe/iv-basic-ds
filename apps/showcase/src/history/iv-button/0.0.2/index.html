<!doctype html>
<html dir="ltr" lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <title>iv-button 0.0.2 - Historico Angular Showcase</title>
    <link rel="stylesheet" href="/build/iv-basic-ds.css" />
    <link rel="stylesheet" href="/components/iv-button/0.0.2/build/iv-button.css" />
    <script type="module" src="/components/iv-button/0.0.2/build/iv-button.esm.js"></script>
    <script nomodule src="/components/iv-button/0.0.2/build/iv-button.js"></script>
    <style>
      body {
        margin: 0;
      }

      .history-page {
        box-sizing: border-box;
        min-height: 100vh;
        padding: var(--iv-space-md);
        background: var(--iv-color-background);
      }

      .history-panel {
        display: grid;
        gap: var(--iv-space-md);
        max-width: 44rem;
        margin: 0 auto;
        padding: var(--iv-space-lg);
        border: 1px solid var(--iv-color-border);
        border-radius: var(--iv-radius-md);
        background: var(--iv-color-surface);
      }

      .history-kicker {
        margin: 0;
        color: var(--iv-color-primary);
        font-size: var(--iv-font-size-sm);
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      h1,
      h2 {
        margin: 0;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        color: var(--iv-color-text-muted);
        line-height: 1.6;
      }

      code {
        border-radius: var(--iv-radius-sm);
        background: rgb(37 99 235 / 0.08);
        color: var(--iv-color-primary);
        padding: 0.12rem 0.35rem;
      }

      .history-stack {
        display: flex;
        flex-wrap: wrap;
        gap: var(--iv-space-sm);
      }

      .history-stack > iv-button {
        flex: 1 1 100%;
      }

      .history-stack > iv-button .iv-button {
        width: 100%;
      }

      @media (min-width: 40rem) {
        .history-page {
          padding: var(--iv-space-xl);
        }

        .history-stack > iv-button {
          flex: 0 1 auto;
        }

        .history-stack > iv-button .iv-button {
          width: auto;
        }
      }
    </style>
  </head>
  <body>
    <main class="history-page">
      <section class="history-panel" aria-labelledby="button-002-title">
        <p class="history-kicker">Historico CDN · 0.0.2</p>
        <h1 id="button-002-title">iv-button 0.0.2</h1>
        <p>Version actual del boton con variante destructiva <code>danger</code>.</p>
        <div class="history-stack" aria-label="Variantes de iv-button 0.0.2">
          <iv-button variant="primary">Primary</iv-button>
          <iv-button variant="secondary">Secondary</iv-button>
          <iv-button variant="ghost">Ghost</iv-button>
          <iv-button variant="danger">Danger</iv-button>
          <iv-button disabled>Disabled</iv-button>
        </div>
        <h2>CDN usado</h2>
        <p><code>/components/iv-button/0.0.2/build/iv-button.esm.js</code></p>
      </section>
    </main>
  </body>
</html>
