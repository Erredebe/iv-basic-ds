<!doctype html>
<html dir="ltr" lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <title>IV Basic DS</title>
    <link rel="stylesheet" href="/build/iv-basic-ds.css" />
    <script type="module" src="/build/iv-basic-ds.esm.js"></script>
    <script nomodule src="/build/iv-basic-ds.js"></script>
  </head>
  <body>
    <main class="iv-demo">
      <section class="iv-demo__hero">
        <p class="iv-demo__eyebrow">IV Basic DS</p>
        <h1>Design System base con StencilJS</h1>
        <p>
          Esta home lista las demos HTML nativas de Stencil. Storybook queda disponible como documentación visual.
        </p>
        <div class="iv-demo__actions">
          <iv-button href="/storybook/" variant="primary">Ir a Storybook</iv-button>
          <iv-button href="/test-report/" variant="secondary">Informe a11y</iv-button>
          <iv-button href="/coverage/" variant="secondary">Coverage spec</iv-button>
          <iv-button href="https://github.com/Erredebe/iv-basic-ds" variant="secondary">Ver repositorio</iv-button>
        </div>
      </section>

      <section class="iv-demo__panel" aria-labelledby="demos-title">
        <h2 id="demos-title">Demos HTML</h2>
        <div class="iv-demo__stack">
          <iv-button href="/demos/button.html" variant="primary">Button</iv-button>
          <iv-button href="/demos/icon.html" variant="secondary">Icon</iv-button>
          <iv-button href="/demos/dialog.html" variant="secondary">Dialog</iv-button>
        </div>
      </section>
    </main>
  </body>
</html>
